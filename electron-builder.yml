# electron-builder configuration — packaging artifact (Workstream 6.A).
#
# NOT executed by `npm run build` (that runs electron-vite for the dev/e2e
# bundle). This declares the OS-level file associations + the `notepads://`
# protocol for a packaged installer, mirroring the UWP Package.appxmanifest
# <uap:Protocol Name="notepads"> + its ~80-group <uap:FileType> set. The runtime
# protocol registration that makes activation work in dev/e2e lives in
# src/main/broker.ts (app.setAsDefaultProtocolClient); this file is the installer
# counterpart for shipped builds.
#
# The association list starts with the documented common subset of the UWP
# manifest's plain-text file types; the full ~200-entry set can be appended
# verbatim from src/Notepads/Package.appxmanifest when packaging lands.

appId: com.notepade.app
productName: NotepadE
copyright: Copyright © Hoshino-Yumetsuki

# Packaged app layout. `yarn build` emits the 3-tier bundle to out/{main,preload,
# renderer}; main loads ../preload/index.js + ../renderer/index.html by RELATIVE
# path, so that sibling structure must ship intact. The tsc typecheck outputs
# (out/types-node, out/types-web) are NOT runtime artifacts and are excluded.
directories:
  output: release
  buildResources: build

files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - package.json
  - '!out/types-node/**'
  - '!out/types-web/**'

# koffi (and other native addons) ship a prebuilt .node binary that cannot live
# inside the asar archive — unpack it so require() resolves it at runtime. koffi
# is only reached as a best-effort cosmetic (win-corners DWM); the app degrades
# gracefully if it is absent, but unpacking keeps it functional.
asarUnpack:
  - '**/*.node'
  - node_modules/@koromix/**

# Custom URI scheme — `notepads://` (incl. the `newinstance` verb the broker
# parses). Mirrors UWP NotepadsProtocolService.
protocols:
  - name: Notepads Protocol
    schemes:
      - notepads

# Plain-text file associations (documented common subset of the UWP manifest).
fileAssociations:
  - ext: txt
    name: Plain Text
    role: Editor
  - ext: md
    name: Markdown
    role: Editor
  - ext: log
    name: Log
    role: Editor

win:
  target:
    - nsis
  icon: build/icon.png
  # Registers the protocol + associations at install time.

nsis:
  # Let the user choose the installation directory (one-click:false shows the full
  # wizard including a destination page). perMachine defaults to false so a user
  # install under AppData works without elevation; the user can switch to per-machine
  # (Program Files) from the directory page if they want.
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  # Custom NSIS hooks. Adds a "Create a desktop shortcut" checkbox page (checked
  # by default) so the user can opt out at install time, and cleans up the
  # runtime "Open with NotepadsE" context-menu key on uninstall.
  include: installer.nsh

mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.developer-tools
  # darwin has no custom frameless caption (native traffic lights draw it); the
  # renderer omits CaptionButtons off-Windows, so the standard title bar is used.

linux:
  target:
    - deb
    - AppImage
  icon: build/icon.png
  category: Utility
  # `deb` requires a maintainer; AppImage is the distro-agnostic portable build.
  maintainer: Hoshino-Yumetsuki <147403913+Hoshino-Yumetsuki@users.noreply.github.com>
  synopsis: Modern, lightweight text editor
  description: >-
    NotepadE — a modern, lightweight, cross-platform text editor with a minimalist design.
