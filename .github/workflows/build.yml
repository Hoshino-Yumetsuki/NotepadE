name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package installer (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-nsis
            glob: |
              release/*.exe
              release/*.exe.blockmap
          - os: ubuntu-latest
            artifact: linux-deb-appimage
            glob: |
              release/*.deb
              release/*.AppImage
          - os: macos-latest
            artifact: macos-dmg
            glob: |
              release/*.dmg
              release/*.dmg.blockmap
    steps:
      - uses: actions/checkout@v6.0.1
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: "lts/*"
      - name: Setup Corepack
        run: |
          corepack enable
          corepack prepare
      - name: Setup Dependencies
        run: |
          yarn install --immutable
      - name: Build installer (electron-builder)
        run: yarn dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload installer artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: installer-${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.1
      - name: Download built artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release
          merge-multiple: true
      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          artifacts: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
