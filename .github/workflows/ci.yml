name: CI

on:
  push:
    branches: ['**']
  pull_request:

# PA-8 is a permanent, build-breaking gate (docs/plan/02-phase-1, R6).
# It runs on every push/PR and must stay green for all completed phases.
jobs:
  pa8-security-gate:
    name: PA-8 Security Gate (static scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: PA-8 scan must FAIL on the deliberately-bad fixture
        run: npm run pa8:scan:fixture
      - name: PA-8 scan must PASS on the real renderer/main tree
        run: npm run pa8:scan

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run vitest unit/component suite
        run: npm test

  e2e:
    name: Playwright Electron (functional, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: pa8-security-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app (emits Electron main for the driver)
        run: npm run build
      # Functional Gate-1/2/3 e2e (round-trip, tabs keyboard/matrix, encoding
      # round-trip corpus, editor keyboard-conformance, undo-granularity).
      # Golden-image (@visual) is excluded here — it has OS/DPI-specific baselines
      # and runs in its own windows-latest job so a cross-OS pixel delta never
      # destabilizes the functional cross-platform gate.
      - name: Run functional Playwright Electron suite (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e:functional
      - name: Run functional Playwright Electron suite (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e:functional
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-functional-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

  e2e-golden:
    name: Playwright golden-image (windows-latest)
    runs-on: windows-latest
    needs: pa8-security-gate
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull Git LFS blobs so golden-image baselines are real PNGs, not pointers.
          lfs: true
      - name: Fetch LFS objects (visual baselines)
        run: git lfs pull
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app (emits Electron main for the driver)
        run: npm run build
      # Golden baselines were captured on Windows; run the @visual gate on
      # windows-latest at matching DPI so the <=0.1% tolerance is meaningful.
      # NOTE (R8): baselines are self-referential drift guards, NOT real UWP
      # SetsView captures — REQUIRES_UWP_REFERENCE before final visual sign-off.
      - name: Run golden-image (@visual) suite
        run: npx playwright test --grep "@visual"
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-golden
          path: playwright-report/
          retention-days: 7
